name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual trigger

jobs:
  docker:
    runs-on: ubuntu-latest
    
    # Ensures tests pass before building docker
    # Needs a separate test job or we just run tests within docker build, but we'll keep it simple
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # We need the model file created so it gets copied into the docker image
    # The Docker build copies the model/ directory, which needs the pre-trained model.
    # Therefore we must train it before building or fetch it from an artifact.
    # We will generate it here.
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies and train model
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python ingestion/fetch_logs.py
        python features/build_features.py
        python model/train.py

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-failure-predictor:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-failure-predictor:${{ github.sha }}
