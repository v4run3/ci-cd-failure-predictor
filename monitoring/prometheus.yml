global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # API service metrics
  - job_name: "cicd-failure-predictor"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          service: "prediction-api"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

rule_files:
  - "alerts.yml"
